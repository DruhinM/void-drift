<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voidrift — Deep Space Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0608;font-family:'Barlow Condensed',sans-serif;color:#e8ddd0}
#c{display:block;position:absolute;top:0;left:0;width:100%;height:100%}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#topbar{position:absolute;top:0;left:0;right:0;padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-start;background:linear-gradient(to bottom,rgba(10,6,8,0.92) 0%,transparent 100%)}
#logo{font-size:26px;font-weight:900;letter-spacing:0.05em;line-height:1;color:#e8ddd0}
#logo span{color:#e8762a}
#mode-pill{font-size:11px;font-weight:700;letter-spacing:0.2em;padding:5px 14px;border:1px solid rgba(232,118,42,0.35);border-radius:3px;color:#e8762a;background:rgba(232,118,42,0.08);margin-top:4px;display:inline-block}
#speed-box{text-align:right}
#speed-num{font-size:32px;font-weight:900;line-height:1;color:#e8ddd0;font-family:'Share Tech Mono',monospace}
#speed-unit{font-size:11px;font-weight:600;letter-spacing:0.2em;color:rgba(232,221,208,0.45)}

/* Crosshair */
#xhair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;pointer-events:none}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(232,118,42,0.55)}
#xhair::before{width:1px;height:20px;left:50%;transform:translateX(-50%)}
#xhair::after{width:20px;height:1px;top:50%;transform:translateY(-50%)}
#xhair-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;border:1px solid rgba(232,118,42,0.3);border-radius:50%}

/* Asteroid label popup */
#ast-hud{position:absolute;top:50%;left:50%;transform:translate(-50%,-210px);text-align:center;opacity:0;transition:opacity 0.5s;pointer-events:none}
#ast-hud.on{opacity:1}
#ast-name{font-size:28px;font-weight:900;letter-spacing:0.06em;color:#e8ddd0;text-shadow:0 0 30px rgba(232,118,42,0.5)}
#ast-sponsor{font-size:11px;font-weight:700;letter-spacing:0.25em;color:#e8762a;margin-top:3px}
#ast-dist{font-size:13px;font-weight:600;color:rgba(232,221,208,0.45);margin-top:8px;font-family:'Share Tech Mono',monospace}

/* Bottom HUD */
#bottombar{position:absolute;bottom:0;left:0;right:0;padding:14px 20px 20px;display:flex;justify-content:space-between;align-items:flex-end;background:linear-gradient(to top,rgba(10,6,8,0.9) 0%,transparent 100%)}
.hpanel{background:rgba(10,6,8,0.8);border:1px solid rgba(232,221,208,0.1);border-radius:4px;padding:10px 14px;min-width:130px}
.hlabel{font-size:10px;font-weight:700;letter-spacing:0.2em;color:rgba(232,221,208,0.4);text-transform:uppercase;margin-bottom:5px}
.hval{font-size:20px;font-weight:900;color:#e8ddd0;font-family:'Share Tech Mono',monospace}
.hval.orange{color:#e8762a}

/* Controls hint */
#ctrl{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:14px;opacity:1;transition:opacity 1.2s}
#ctrl.gone{opacity:0}
.ck{text-align:center}
.kb{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:1px solid rgba(232,221,208,0.15);border-radius:4px;font-size:13px;font-weight:700;color:rgba(232,221,208,0.4);background:rgba(10,6,8,0.7)}
.kl{font-size:9px;font-weight:700;letter-spacing:0.12em;color:rgba(232,221,208,0.3);margin-top:3px}

/* Leaderboard */
#lb{position:absolute;top:72px;right:20px;background:rgba(10,6,8,0.88);border:1px solid rgba(232,221,208,0.1);border-radius:4px;padding:14px;width:210px}
#lb h3{font-size:10px;font-weight:700;letter-spacing:0.22em;color:#e8762a;margin-bottom:12px}
.lr{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(232,221,208,0.06)}
.lr:last-child{border:none}
.lrank{font-family:'Share Tech Mono',monospace;color:rgba(232,221,208,0.35);width:20px}
.lrank.g{color:#e8762a}
.lname{flex:1;padding:0 8px;font-weight:600;letter-spacing:0.04em}
.ltime{font-family:'Share Tech Mono',monospace;color:#e8762a;font-size:11px}
.lryou{background:rgba(232,118,42,0.07);border-radius:2px}

/* Race timer */
#rtimer{position:absolute;top:72px;left:50%;transform:translateX(-50%);text-align:center;display:none}
#rtimer .rl{font-size:10px;font-weight:700;letter-spacing:0.25em;color:#e8762a}
#rtimer .rt{font-size:48px;font-weight:900;color:#e8ddd0;line-height:1;font-family:'Share Tech Mono',monospace}
#rtimer .rn{font-size:12px;font-weight:600;letter-spacing:0.12em;color:rgba(232,221,208,0.4);margin-top:4px}

/* Notification */
#notif{position:absolute;top:72px;left:50%;transform:translateX(-50%);background:rgba(10,6,8,0.9);border:1px solid rgba(232,118,42,0.3);border-radius:3px;padding:9px 20px;font-size:13px;font-weight:700;letter-spacing:0.06em;color:#e8ddd0;opacity:0;transition:opacity 0.35s;pointer-events:none;white-space:nowrap}
#notif.on{opacity:1}

/* Minimap */
#mm{position:absolute;bottom:88px;right:20px;width:120px;height:120px}
#mm canvas{border-radius:50%;border:1px solid rgba(232,221,208,0.1)}

/* Race panel */
#rpanel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,6,8,0.96);border:1px solid rgba(232,118,42,0.25);border-radius:6px;padding:30px 40px;text-align:center;display:none;pointer-events:all;min-width:340px}
#rpanel h2{font-size:28px;font-weight:900;letter-spacing:0.08em;margin-bottom:4px}
#rpanel .rsub{font-size:11px;font-weight:700;letter-spacing:0.2em;color:#e8762a;margin-bottom:22px}
.wps{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.wp{font-size:10px;font-weight:700;letter-spacing:0.12em;padding:5px 12px;border-radius:3px;border:1px solid rgba(232,221,208,0.12);color:rgba(232,221,208,0.4);background:rgba(232,221,208,0.03)}
.wp.cur{border-color:rgba(232,118,42,0.6);color:#e8762a;background:rgba(232,118,42,0.08)}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:0.12em;padding:12px 28px;border-radius:3px;border:none;cursor:pointer;transition:opacity 0.2s;pointer-events:all}
.btnp{background:#e8762a;color:#0a0608}
.btns{background:transparent;border:1px solid rgba(232,221,208,0.15);color:rgba(232,221,208,0.5);margin-left:10px}
.btn:hover{opacity:0.78}

/* Menu */
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,6,8,0.97);z-index:10;pointer-events:all}
#menu h1{font-size:72px;font-weight:900;letter-spacing:0.06em;line-height:1;margin-bottom:4px}
#menu h1 span{color:#e8762a}
#menu .sub{font-size:13px;font-weight:700;letter-spacing:0.25em;color:rgba(232,221,208,0.4);margin-bottom:50px}
.mbtn{width:300px;padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;letter-spacing:0.12em;border-radius:4px;cursor:pointer;transition:all 0.18s;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mbtn:hover{opacity:0.8;transform:translateX(5px)}
.mbtnp{background:#e8762a;color:#0a0608;border:none}
.mbtns{background:transparent;color:#e8ddd0;border:1px solid rgba(232,221,208,0.15)}
#menu .hint{font-size:10px;font-weight:700;letter-spacing:0.18em;color:rgba(232,221,208,0.2);margin-top:36px}

/* Thruster bar */
#tbar{position:absolute;bottom:88px;left:20px;display:flex;flex-direction:column;gap:3px;align-items:center}
#tbar .tlabel{font-size:9px;font-weight:700;letter-spacing:0.15em;color:rgba(232,221,208,0.3)}
#tbar .ttrack{width:6px;height:60px;background:rgba(232,221,208,0.08);border-radius:3px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
#tbar .tfill{width:100%;background:#e8762a;border-radius:3px;transition:height 0.1s}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="topbar">
    <div>
      <div id="logo">VOID<span>RIFT</span></div>
      <div id="mode-pill">FREE DRIFT</div>
    </div>
    <div id="speed-box">
      <div id="speed-num">0.0</div>
      <div id="speed-unit">M/S</div>
    </div>
  </div>

  <div id="xhair-ring"></div>
  <div id="xhair"></div>

  <div id="ast-hud">
    <div id="ast-name"></div>
    <div id="ast-sponsor"></div>
    <div id="ast-dist"></div>
  </div>

  <div id="rtimer">
    <div class="rl">RACE TIME</div>
    <div class="rt" id="rt-disp">0:00.0</div>
    <div class="rn" id="rt-next"></div>
  </div>

  <div id="notif"></div>

  <div id="lb">
    <h3>TODAY'S BEST</h3>
    <div id="lb-list"></div>
  </div>

  <div id="mm"><canvas id="mmc" width="120" height="120"></canvas></div>

  <div id="tbar">
    <div class="ttrack"><div class="tfill" id="tfill" style="height:0%"></div></div>
    <div class="tlabel">THR</div>
  </div>

  <div id="bottombar">
    <div class="hpanel">
      <div class="hlabel">Discovered</div>
      <div class="hval" id="disc-ct">0 / 12</div>
    </div>
    <div id="ctrl">
      <div class="ck"><div class="kb">W</div><div class="kl">THRUST</div></div>
      <div class="ck"><div class="kb">A</div><div class="kl">LEFT</div></div>
      <div class="ck"><div class="kb">D</div><div class="kl">RIGHT</div></div>
      <div class="ck"><div class="kb">S</div><div class="kl">BRAKE</div></div>
      <div class="ck"><div class="kb">Q</div><div class="kl">UP</div></div>
      <div class="ck"><div class="kb">E</div><div class="kl">DOWN</div></div>
      <div class="ck"><div class="kb">R</div><div class="kl">RACE</div></div>
    </div>
    <div class="hpanel" style="text-align:right">
      <div class="hlabel">Best race</div>
      <div class="hval orange" id="best-t">--:--.-</div>
    </div>
  </div>

  <div id="rpanel">
    <h2>DAILY RACE</h2>
    <div class="rsub">ASTEROID CIRCUIT — TODAY'S TRACK</div>
    <div class="wps" id="rwps"></div>
    <button class="btn btnp" id="rstart">LAUNCH RACE</button>
    <button class="btn btns" id="rcancel">CANCEL</button>
  </div>
</div>

<div id="menu">
  <h1>VOID<span>RIFT</span></h1>
  <div class="sub">DEEP SPACE · ASTEROID EXPLORER · MOMENTUM DRIFT</div>
  <button class="mbtn mbtnp" id="play-btn">FREE DRIFT <span>→</span></button>
  <button class="mbtn mbtns" id="race-btn">DAILY RACE <span style="color:#e8762a">◆</span></button>
  <div class="hint">WASD TO DRIFT · Q/E VERTICAL · R FOR RACE</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Scene setup ────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0608, 0.0055);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0,2,8);

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── Lighting (DRG-style: warm key, cold fill, dark ambient) ─
const ambient = new THREE.AmbientLight(0x1a1018, 1.2);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xffe8c0, 2.8);
sunLight.position.set(80,60,40);
sunLight.castShadow = true;
scene.add(sunLight);

const rimLight = new THREE.DirectionalLight(0x203060, 1.2);
rimLight.position.set(-60,-30,-80);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0x301820, 0.6);
fillLight.position.set(0,80,0);
scene.add(fillLight);

// ── Stars ──────────────────────────────────────────────
{
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0;i<3000;i++){
    const r = 600+Math.random()*400;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    pos.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
  }
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  const mat = new THREE.PointsMaterial({color:0xfff0e0,size:1.2,sizeAttenuation:true});
  scene.add(new THREE.Points(geo,mat));
}

// ── Nebula planes ──────────────────────────────────────
function makeNebula(color,x,y,z,rx,ry,scale){
  const geo=new THREE.PlaneGeometry(500,500);
  const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.04,depthWrite:false,side:THREE.DoubleSide});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,0); m.scale.setScalar(scale);
  scene.add(m);
}
makeNebula(0x4422aa,100,0,-200,0.3,0.1,1);
makeNebula(0x882244,-150,50,-180,0.1,0.4,0.8);
makeNebula(0x224466,0,-80,-250,0.5,0.2,1.2);

// ── Asteroid factory ───────────────────────────────────
const ASTEROID_DEFS = [
  {name:'Ceres Prime',     sponsor:'RED BULL OUTPOST',    color:0x8877aa, scale:2.8, rough:true },
  {name:'Vesta Rock',      sponsor:'NVIDIA DEEP NODE',    color:0x997766, scale:2.0, rough:true },
  {name:'Pallas Station',  sponsor:'GITHUB CLUSTER',      color:0x778899, scale:2.4, rough:false},
  {name:'Hygiea Base',     sponsor:'AWS EDGE ZONE',       color:0x887755, scale:1.6, rough:true },
  {name:'Juno Drift',      sponsor:'STRIPE HUB',          color:0x99aacc, scale:2.2, rough:false},
  {name:'Davida Point',    sponsor:'COINGECKO RELAY',     color:0x776655, scale:1.4, rough:true },
  {name:'Interamnia',      sponsor:'VERCEL EDGE NODE',    color:0xaabbcc, scale:2.6, rough:false},
  {name:'Europa Shard',    sponsor:null,                   color:0x887799, scale:1.8, rough:true },
  {name:'Sylvia Cluster',  sponsor:null,                   color:0x998877, scale:1.3, rough:false},
  {name:'Eunomia Belt',    sponsor:'FIGMA STUDIO',        color:0x7788aa, scale:1.9, rough:true },
  {name:'Psyche Forge',    sponsor:null,                   color:0xccbbdd, scale:2.0, rough:false},
  {name:'Camilla Far',     sponsor:'DISCORD RELAY',       color:0x99aabb, scale:1.5, rough:true },
];

function buildAsteroidMesh(def){
  // DRG-style: IcosahedronGeometry heavily distorted + noise bumps
  const detail = def.rough ? 3 : 2;
  const geo = new THREE.IcosahedronGeometry(10, detail);
  const pos = geo.attributes.position;

  // Per-vertex displacement — chunky organic shape
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i), y=pos.getY(i), z=pos.getZ(i);
    const len=Math.sqrt(x*x+y*y+z*z);
    // Large-scale lumpiness
    const n1=Math.sin(x*0.18+0.7)*Math.cos(y*0.22+1.1)*Math.sin(z*0.19+0.3);
    const n2=Math.sin(x*0.35+2.1)*Math.cos(z*0.28+0.8);
    const n3=Math.cos(y*0.41+1.5)*Math.sin(x*0.29+z*0.21);
    const disp = 1 + 0.38*n1 + 0.18*n2 + 0.10*n3;
    const s=len*disp/len;
    pos.setXYZ(i,x*s,y*s,z*s);
  }
  geo.computeVertexNormals();

  // Vertex colors for surface variation (DRG has dark crevices, bright peaks)
  const colors=[];
  for(let i=0;i<pos.count;i++){
    const y=pos.getY(i);
    const r=(def.color>>16&0xff)/255;
    const g=(def.color>>8&0xff)/255;
    const b=(def.color&0xff)/255;
    // Darken crevices by y-based noise
    const dark=0.6+0.4*Math.abs(Math.sin(pos.getX(i)*0.15+pos.getZ(i)*0.12));
    colors.push(r*dark,g*dark,b*dark);
  }
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));

  const mat = new THREE.MeshStandardMaterial({
    vertexColors:true,
    roughness:0.92,
    metalness:def.rough?0.08:0.15,
  });

  const mesh = new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  mesh.receiveShadow=true;
  mesh.scale.setScalar(def.scale);

  // Point light on sponsored asteroids (DRG has glowing minerals)
  if(def.sponsor){
    const pl=new THREE.PointLight(0xff8833,2.5,60);
    pl.position.set(0,12,0);
    mesh.add(pl);
  }

  return mesh;
}

// Sponsor billboard — canvas texture on a plane
function buildBillboard(text){
  const cw=512,ch=128;
  const bc=document.createElement('canvas');
  bc.width=cw;bc.height=ch;
  const bx=bc.getContext('2d');
  bx.clearRect(0,0,cw,ch);
  bx.fillStyle='rgba(10,6,8,0.82)';
  roundRect(bx,4,4,cw-8,ch-8,12);
  bx.fill();
  bx.strokeStyle='rgba(232,118,42,0.6)';
  bx.lineWidth=2;
  roundRect(bx,4,4,cw-8,ch-8,12);
  bx.stroke();
  bx.font='bold 38px Barlow Condensed,sans-serif';
  bx.fillStyle='#e8762a';
  bx.textAlign='center';
  bx.textBaseline='middle';
  bx.fillText(text,cw/2,ch/2-8);
  bx.font='500 20px Barlow Condensed,sans-serif';
  bx.fillStyle='rgba(232,221,208,0.45)';
  bx.fillText('SPONSORED ASTEROID',cw/2,ch/2+24);

  const tex=new THREE.CanvasTexture(bc);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
  const plane=new THREE.Mesh(new THREE.PlaneGeometry(18,4.5),mat);
  return plane;
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Place asteroids in 3D space
const asteroids = ASTEROID_DEFS.map((def,i)=>{
  const angle=(i/ASTEROID_DEFS.length)*Math.PI*2+Math.random()*0.5;
  const dist=120+Math.random()*220;
  const height=(Math.random()-0.5)*80;
  const ax=Math.cos(angle)*dist;
  const ay=height;
  const az=Math.sin(angle)*dist;

  const mesh=buildAsteroidMesh(def);
  mesh.position.set(ax,ay,az);
  mesh.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
  scene.add(mesh);

  // Billboard above asteroid
  if(def.sponsor){
    const bb=buildBillboard(def.sponsor);
    bb.position.set(ax,ay+def.scale*11+4,az);
    scene.add(bb);
  }

  return {
    ...def,
    mesh,
    ax,ay,az,
    visited:false,
    rotSpd:new THREE.Vector3((Math.random()-0.5)*0.003,(Math.random()-0.5)*0.004,(Math.random()-0.5)*0.003),
    glowPhase:Math.random()*Math.PI*2,
  };
});

// ── Ship ───────────────────────────────────────────────
const shipPivot = new THREE.Object3D();
scene.add(shipPivot);

// Ship geometry — sleek space craft
function buildShip(){
  const g=new THREE.Group();

  // Hull
  const hullGeo=new THREE.ConeGeometry(0.5,2.4,8);
  const hullMat=new THREE.MeshStandardMaterial({color:0xd0c8c0,roughness:0.3,metalness:0.7});
  const hull=new THREE.Mesh(hullGeo,hullMat);
  hull.rotation.x=Math.PI/2;
  hull.castShadow=true;
  g.add(hull);

  // Wings
  const wingGeo=new THREE.BoxGeometry(2.2,0.08,0.9);
  const wingMat=new THREE.MeshStandardMaterial({color:0xa0a8b0,roughness:0.4,metalness:0.6});
  const wings=new THREE.Mesh(wingGeo,wingMat);
  wings.position.z=0.3;
  wings.castShadow=true;
  g.add(wings);

  // Engine glow
  const engGeo=new THREE.CylinderGeometry(0.18,0.28,0.4,8);
  const engMat=new THREE.MeshBasicMaterial({color:0xff6600});
  const eng=new THREE.Mesh(engGeo,engMat);
  eng.rotation.x=Math.PI/2;
  eng.position.z=1.2;
  g.add(eng);

  // Engine point light
  const el=new THREE.PointLight(0xff5500,0,8);
  el.position.z=1.5;
  g.add(el);

  return {group:g, engLight:el};
}

const {group:shipMesh, engLight} = buildShip();
scene.add(shipMesh);

// Camera follows ship with lag
const camOffset = new THREE.Vector3(0,1.8,9);
const camTarget = new THREE.Vector3();

// ── Ship physics ───────────────────────────────────────
const shipPos = new THREE.Vector3(0,0,0);
const shipVel = new THREE.Vector3(0,0,0);
const shipRot = new THREE.Euler(0,0,0,'YXZ');
const THRUST=0.14, DRAG=0.9988, BRAKE=0.91, TURN=0.038, MAX_SPD=9;

// ── Input ──────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='r'&&gState==='play') openRace();
  if(['w','a','s','d','q','e',' '].includes(e.key.toLowerCase())){
    e.preventDefault();
    document.getElementById('ctrl').classList.add('gone');
  }
});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

// ── Game state ─────────────────────────────────────────
let gState='menu';
let discCount=0;
let bestTime=null;
let raceActive=false,raceStart=0,raceWps=[],raceIdx=0;
let notifTO=null;

const LB=[
  {name:'COSMO_K',t:68.4},{name:'DRIFTER99',t:71.2},
  {name:'NOVA_X',t:74.8},{name:'YOU',t:null},{name:'STELLAR_X',t:89.1},
];
renderLB();

function renderLB(){
  const el=document.getElementById('lb-list');
  el.innerHTML=LB.map((e,i)=>`
    <div class="lr${e.name==='YOU'?' lryou':''}">
      <span class="lrank${i===0?' g':''}">${i+1}</span>
      <span class="lname">${e.name}</span>
      <span class="ltime">${e.t?fmtT(e.t):'--:--.-'}</span>
    </div>`).join('');
}

function fmtT(s){
  const m=Math.floor(s/60);
  const sec=(s%60).toFixed(1).padStart(4,'0');
  return `${m}:${sec}`;
}

// Race
function buildRace(){
  raceWps=[asteroids[0],asteroids[4],asteroids[6],asteroids[2],asteroids[10],asteroids[3]];
  const el=document.getElementById('rwps');
  el.innerHTML=raceWps.map((a,i)=>`<span class="wp" id="wp${i}">${a.name.toUpperCase()}</span>`).join('<span style="color:rgba(232,118,42,0.4);font-size:11px;align-self:center">›</span>');
}

function openRace(){
  buildRace();
  document.getElementById('rpanel').style.display='block';
}

document.getElementById('rstart').addEventListener('click',startRace);
document.getElementById('rcancel').addEventListener('click',()=>{document.getElementById('rpanel').style.display='none';});

function startRace(){
  document.getElementById('rpanel').style.display='none';
  raceActive=true; raceIdx=0; raceStart=performance.now();
  gState='race';
  document.getElementById('mode-pill').textContent='RACE MODE';
  document.getElementById('rtimer').style.display='block';
  updateRaceWps();
  notify('RACE STARTED — HEAD TO '+raceWps[0].name.toUpperCase());
}

function updateRaceWps(){
  raceWps.forEach((_,i)=>{
    const el=document.getElementById('wp'+i);
    if(el)el.className='wp'+(i===raceIdx?' cur':'');
  });
  if(raceIdx<raceWps.length)
    document.getElementById('rt-next').textContent='→ '+raceWps[raceIdx].name.toUpperCase();
}

function checkRaceWp(ast){
  if(!raceActive||ast!==raceWps[raceIdx]) return;
  raceIdx++;
  if(raceIdx>=raceWps.length){finishRace();}
  else{updateRaceWps();notify('CHECKPOINT — '+raceWps[raceIdx].name.toUpperCase());}
}

function finishRace(){
  const elapsed=(performance.now()-raceStart)/1000;
  raceActive=false; gState='play';
  document.getElementById('mode-pill').textContent='FREE DRIFT';
  document.getElementById('rtimer').style.display='none';
  if(!bestTime||elapsed<bestTime){
    bestTime=elapsed;
    document.getElementById('best-t').textContent=fmtT(elapsed);
    LB[3].t=elapsed;
    LB.sort((a,b)=>(a.t||999)-(b.t||999));
    renderLB();
  }
  notify('RACE COMPLETE — '+fmtT(elapsed));
}

function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(notifTO);
  notifTO=setTimeout(()=>el.classList.remove('on'),3000);
}

// Menu
document.getElementById('play-btn').addEventListener('click',()=>{
  document.getElementById('menu').style.display='none';
  gState='play';
});
document.getElementById('race-btn').addEventListener('click',()=>{
  document.getElementById('menu').style.display='none';
  gState='play';
  setTimeout(openRace,200);
});

// ── Main loop ──────────────────────────────────────────
const clock=new THREE.Clock();
const _fwd=new THREE.Vector3();
const _right=new THREE.Vector3();
const _up=new THREE.Vector3();

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05);

  if(gState==='menu'){renderer.render(scene,camera);return;}

  const thrusting=keys['w']||keys['arrowup'];
  const braking=keys['s']||keys['arrowdown'];
  const thrustAmt=thrusting?1:0;

  // Rotation
  if(keys['a']||keys['arrowleft']) shipRot.y+=TURN;
  if(keys['d']||keys['arrowright']) shipRot.y-=TURN;
  if(keys['q']) shipRot.x-=TURN*0.6;
  if(keys['e']) shipRot.x+=TURN*0.6;
  shipRot.x=Math.max(-Math.PI*0.45,Math.min(Math.PI*0.45,shipRot.x));

  // Forward vector from ship rotation
  const quat=new THREE.Quaternion().setFromEuler(shipRot);
  _fwd.set(0,0,-1).applyQuaternion(quat);

  if(thrusting){
    const spd=shipVel.length();
    if(spd<MAX_SPD){
      shipVel.addScaledVector(_fwd,THRUST);
    }
  }
  if(braking){shipVel.multiplyScalar(BRAKE);}

  shipVel.multiplyScalar(DRAG);
  shipPos.addScaledVector(shipVel,1);

  // Apply to ship mesh
  shipMesh.position.copy(shipPos);
  shipMesh.quaternion.copy(quat);

  // Engine glow
  engLight.intensity=thrusting?(1.5+Math.random()*0.8):0;
  document.getElementById('tfill').style.height=(thrustAmt*100)+'%';

  // Camera lag follow
  const desiredCamPos=shipPos.clone().add(camOffset.clone().applyQuaternion(quat));
  camera.position.lerp(desiredCamPos,0.06);
  camTarget.lerp(shipPos,0.08);
  camera.lookAt(camTarget);

  // Billboard facing (always face camera)
  const camDir=new THREE.Vector3().subVectors(camera.position,new THREE.Vector3(0,0,0)).normalize();
  scene.traverse(obj=>{
    if(obj.isMesh&&obj.material&&obj.material.map&&obj.material.transparent){
      obj.lookAt(camera.position);
    }
  });

  // Asteroid rotation + proximity
  let nearAst=null, nearDist=Infinity;
  let discTotal=0;

  asteroids.forEach(a=>{
    a.mesh.rotation.x+=a.rotSpd.x;
    a.mesh.rotation.y+=a.rotSpd.y;
    a.mesh.rotation.z+=a.rotSpd.z;

    const dist=shipPos.distanceTo(new THREE.Vector3(a.ax,a.ay,a.az));
    const hitR=a.scale*11+4;

    if(dist<hitR&&!a.visited){
      a.visited=true; discCount++;
      document.getElementById('disc-ct').textContent=discCount+' / 12';
      notify('DISCOVERED: '+a.name.toUpperCase()+(a.sponsor?' — '+a.sponsor:''));
      checkRaceWp(a);
    } else if(dist<hitR&&a.visited){
      checkRaceWp(a);
    }

    if(dist<hitR+120&&dist<nearDist){nearDist=dist;nearAst=a;}
    if(a.visited) discTotal++;
  });

  // HUD asteroid label
  const hudEl=document.getElementById('ast-hud');
  if(nearAst&&nearDist<nearAst.scale*11+100){
    document.getElementById('ast-name').textContent=nearAst.name.toUpperCase();
    document.getElementById('ast-sponsor').textContent=nearAst.sponsor||'';
    document.getElementById('ast-dist').textContent=Math.round(nearDist-nearAst.scale*10)+'m';
    hudEl.classList.add('on');
  } else {
    hudEl.classList.remove('on');
  }

  // Speed HUD
  document.getElementById('speed-num').textContent=shipVel.length().toFixed(1);

  // Race timer
  if(raceActive){
    const el=(performance.now()-raceStart)/1000;
    document.getElementById('rt-disp').textContent=fmtT(el);
  }

  // Minimap
  drawMinimap();

  renderer.render(scene,camera);
}

// ── Minimap ─────────────────────────────────────────────
const mmc=document.getElementById('mmc');
const mmx=mmc.getContext('2d');
function drawMinimap(){
  mmx.clearRect(0,0,120,120);
  mmx.fillStyle='rgba(10,6,8,0.75)';
  mmx.beginPath();mmx.arc(60,60,59,0,Math.PI*2);mmx.fill();

  const scale=0.22;
  asteroids.forEach(a=>{
    const mx=60+(a.ax-shipPos.x)*scale;
    const my=60+(a.az-shipPos.z)*scale;
    if(mx<2||mx>118||my<2||my>118) return;
    const r=Math.max(2,a.scale*scale*2.5);
    mmx.beginPath();mmx.arc(mx,my,r,0,Math.PI*2);
    mmx.fillStyle=a.visited?'#e8762a':'rgba(232,221,208,0.25)';
    mmx.fill();
    if(raceActive&&a===raceWps[raceIdx]){
      mmx.strokeStyle='#e8762a';mmx.lineWidth=1.5;mmx.stroke();
    }
  });

  // Ship dot
  mmx.beginPath();mmx.arc(60,60,3.5,0,Math.PI*2);
  mmx.fillStyle='#e8ddd0';mmx.fill();

  // Clip
  mmx.save();
  mmx.globalCompositeOperation='destination-in';
  mmx.beginPath();mmx.arc(60,60,58,0,Math.PI*2);mmx.fill();
  mmx.restore();
}

loop();
</script>
